name: SNOW Pulse CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-validation:
    name: Backend Validation (Linter, Type Checker & Tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server
          sudo service redis-server start

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx ruff mypy

      - name: Run Ruff Linter
        run: ruff check backend --config backend/ruff.toml

      - name: Run Mypy Type Checker
        run: mypy backend --config-file backend/mypy.ini --explicit-package-bases

      - name: Run Pytest Suite
        env:
          REDIS_URL: redis://localhost:6379/0
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pytest --cov=backend/app --cov-report=xml

  frontend-validation:
    name: Frontend Validation (Vitest Component Tests)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest Suite
        working-directory: frontend
        run: npm run test
