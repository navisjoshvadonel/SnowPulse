version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: snowpulse-db
    restart: always
    environment:
      POSTGRES_DB: snowpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d snowpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: snowpulse-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snowpulse-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:supersecretpassword123@db:5432/snowpulse
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change_this_to_something_really_secure_for_production_env
      GEMINI_API_KEY: ${GEMINI_API_KEY:-mock}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snowpulse-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: snowpulse-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
